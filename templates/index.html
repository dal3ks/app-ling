<!DOCTYPE html>
<html lan="eng">
<head>
    <meta charset="UTF-8" />
    <title> AlexReads</title>
    <style>
nav {
    position: fixed;
    top: 0;
    right: 0;
    padding: 1rem 2rem;
    z-index: 100;
}

nav a {
    color: #a8a1c3;
    text-decoration: none;
    letter-spacing: 0.1rem;
    font-size: 0.9rem;
    border: 1px solid rgba(255, 255, 255, 0.15);
    padding: 0.5rem 1rem;
}

nav a:hover {
    color: #e0b0ff;
}
    body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    font-family: Georgia, serif;
    color: #a8a1c3;
    background-image: url('/static/library.jpeg');
    background-size: cover;
    background-attachment: fixed;
}

.container {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: rgba(20, 10, 20, 0.6);
    padding: 4rem;
}

h1 {
    font-size: 3rem;
    margin-bottom: 0.25rem;
    color: #d4c5e2;
}

p.tagline {
    color: #a8a1c3;
    margin-bottom: 2rem;
    font-weight: bolder;
}

.cards {
    display: flex;
    gap: 1.5rem;
    margin: 2rem 0;
}

.cards a {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 120px;
    height: 280px;
    background: rgba(255, 255, 255, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: #a8a1c3;
    text-decoration: none;
    font-size: 1.1rem;
    letter-spacing: 0.15rem;
    transition: background 0.3s;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
}

.cards a:hover {
    background: rgba(255, 255, 255, 0.22);
    color: #e0b0ff;
}
</style>
</head>
<body>
    <nav>
    <a href="/sessions/new">Log In</a>
    
</nav>

    <div class="container">
    <h1>Welcome to AlexReads!</h1>
    <p class="tagline">A cosy digital bookcorner.</p>
    <div class="cards">
        <a href="/books">Books</a>
        <a href="/films">Films</a>
    </div>

    </div>
</body>
</html>
