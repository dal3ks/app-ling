<!DOCTYPE html>
<html lan="eng">
<head>
    <meta charset="UTF-8" />
    <title> AlexReads</title>
    <style>
        body {
            font-family: Georgia, serif;
            max-width 600px;
            margin 60px auto;
            padding 0 1rem;
            background-size: cover;
            background-image: url('/static/library.jpeg');
            background-attachment: fixed; 
            color: #521d1d;
        }
.container {
    background: rgba(62, 47, 47, 0.6);
    padding: 2rem;
    color: rgb(159, 160, 188);
}
        h1 {
            font-size: 2.5rem;
            margin-bottom:0.25rem;
        }
        p.tagline {
            color: #a8a1c3;
            margin-bottom: 2rem;
            font-weight: bolder;
        }

        ul {
            list-style: none;
            padding: 0;
        }
        li {
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(213, 194, 194, 0.958);}
        li: last-child{
            border-bottom: none;
        }
        .author {
            color: #e0b0ff;
            font-size: 0.75rem;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
    <h1>Welcome to AlexReads!</h1>
    <p class="tagline">A cosy digital bookcorner.</p>
    <h2> Current Books</h2>
    <ul>
        <li> The Gruffalo <span class="author">- Julia Donaldson</span></li>
        <li> Ada Twist, Scientist <span class="author">- Andrea Beaty</span></li>
        <li> The Girl Who Drank The Moon <span class="author">- Kelly Barnhill</span></li>
        <li> Dragons in a Bag <span class="author">- Zetta Elliott</span></li>
    </ul>
    </div>
</body>
</html>
